
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Invoice Extractor
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="container">

        <h1>
            Invoice Extractor
        </h1>

        <p>
            Select Invoice Source
        </p>

        <select id="sourceSelect">
            <option value="amazon">Amazon</option>
            <option value="swiggy">Swiggy</option>
            <option value="zomato">Zomato</option>
        </select>

        <p>
            Select Folder Containing PDFs
        </p>

        <input
            type="file"
            id="folderInput"
            webkitdirectory
            directory
            multiple
        >

        <button onclick="uploadFolder()">
            Generate Excel
        </button>

        <p id="status"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
