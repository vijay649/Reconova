<!DOCTYPE html>
<html>

<head>

    <title>Reconova Signup</title>

    <link rel="stylesheet" href="../css/auth.css">

</head>

<body>

    <div class="auth-card">

        <h1>Create Account</h1>

        <form id="signupForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">
                Create Account
            </button>
            <p class="auth-link">Already have an account?

                <a href="login.html">
                    Login
                </a>

            </p>

        </form>

        <p id="message"></p>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/signup.js"></script>

</body>

</html>
