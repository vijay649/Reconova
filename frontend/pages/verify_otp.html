<!DOCTYPE html>
<html>

<head>

    <title>Verify OTP</title>

    <link rel="stylesheet" href="/css/auth.css">

</head>

<body>

    <div class="auth-card">

        <h1>Verify Email</h1>

        <form id="verifyForm">

            <input
                type="text"
                id="otp"
                placeholder="Enter OTP"
                required>

            <button type="submit">
                Verify OTP
            </button>

        </form>

        <p id="message"></p>

    </div>

    <script src="/js/config.js"></script>
    <script src="/js/verify.js"></script>

</body>

</html>
