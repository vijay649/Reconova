<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reconova Login</title>

    <link rel="stylesheet" href="/css/auth.css">

</head>


<body>


<div class="auth-card">


    <h1>
        Login
    </h1>



    <form id="loginForm">


        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >



        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >



        <button type="submit">

            Login

        </button>



        <p class="auth-link">

            Don't have an account?

            <a href="/signup">

                Create Account

            </a>


        </p>


    </form>



    <p id="message"></p>


</div>



<script src="/js/config.js"></script>

<script src="/js/login.js"></script>



</body>

</html>
